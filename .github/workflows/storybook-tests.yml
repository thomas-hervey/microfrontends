# .github/workflows/storybook-tests.yml

name: 'Storybook Tests'

on:
  push:
    # Only run when there are changes to the storybook directory
    paths:
      - 'packages/acme-storybook/**'
      - 'packages/acme-design-system/**'
jobs:
  test-storybook:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Change directory
        run: 'echo "Working directory: $PWD"'
        working-directory: ./packages/acme-storybook

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build Storybook
        run: pnpm build-storybook --quiet

      - name: Serve Storybook and run tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "npx http-server storybook-static --port 6006 --silent" \
            "npx wait-on tcp:6006 && pnpm test-storybook"
